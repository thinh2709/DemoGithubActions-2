<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${name} + ' | Profile'"></title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .skill-badge {
            transition: all 0.3s ease;
        }
        .skill-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .social-link {
            transition: all 0.2s ease;
        }
        .social-link:hover {
            color: #2563eb;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <!-- Main Card -->
        <div class="glass rounded-3xl shadow-2xl overflow-hidden">
            <!-- Header Section -->
            <div class="relative h-48 bg-blue-600">
                <div class="absolute -bottom-16 left-1/2 -translate-x-1/2">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=NguyenPhucThinh." 
                         alt="Avatar" 
                         class="w-32 h-32 rounded-2xl border-4 border-white shadow-lg bg-white">
                </div>
            </div>

            <!-- Content Section -->
            <div class="pt-20 pb-10 px-8 text-center">
                <h1 class="text-3xl font-bold text-gray-900 mb-1" th:text="${name}">Tên Mặc Định</h1>
                <p class="text-blue-600 font-medium mb-4" th:text="${job}">Nghề Nghiệp Mặc Định</p>
                
                <div class="flex flex-wrap justify-center gap-4 text-sm text-gray-600 mb-6">
                    <span class="flex items-center gap-2">
                        <i class="fas fa-map-marker-alt text-red-500"></i>
                        <span th:text="${location}">Địa điểm</span>
                    </span>
                    <span class="flex items-center gap-2">
                        <i class="fas fa-envelope text-blue-500"></i>
                        <span th:text="${email}">Email</span>
                    </span>
                    <span class="flex items-center gap-2">
                        <i class="fas fa-phone text-green-500"></i>
                        <span th:text="${phone}">Số điện thoại</span>
                    </span>
                </div>

                <div class="max-w-xl mx-auto mb-8">
                    <p class="text-gray-700 leading-relaxed text-lg" th:text="${bio}">
                        Tiểu sử mặc định.
                    </p>
                </div>

                <!-- Skills Section -->
                <div class="mb-8">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4 uppercase tracking-wider">Kỹ Năng</h3>
                    <div class="flex flex-wrap justify-center gap-2">
                        <span th:each="skill : ${skills}" 
                              class="skill-badge px-4 py-2 bg-white text-gray-800 rounded-full text-sm font-medium border border-gray-200 shadow-sm"
                              th:text="${skill}">
                            Kỹ năng
                        </span>
                    </div>
                </div>

                <!-- Social Links -->
                <div class="flex justify-center gap-6 text-2xl text-gray-400">
                    <a th:href="${github}" target="_blank" class="social-link" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a th:href="${linkedin}" target="_blank" class="social-link" title="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a th:href="${facebook}" target="_blank" class="social-link" title="Facebook">
                        <i class="fab fa-facebook"></i>
                    </a>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="bg-gray-50 py-4 px-8 border-t border-gray-100">
                <p class="text-center text-gray-500 text-sm">
                    &copy; 2024 <span th:text="${name}"></span>. Thiết kế bởi Trae AI.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
